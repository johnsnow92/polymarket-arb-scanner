name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (critical rules only)
        run: |
          pip install ruff
          # E9/F63/F7/F82: syntax errors, undefined names, misused comparisons —
          # correctness-only gate; full style adoption tracked separately.
          ruff check . --select E9,F63,F7,F82

      - name: Run tests
        # Gate on pytest's exit code directly. The previous grep-based summary
        # parsing returned green when pytest crashed before printing a summary
        # (import error, OOM) — exactly the failure a merge gate must catch.
        run: pytest tests/ -v --tb=short

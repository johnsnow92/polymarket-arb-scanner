# .github/workflows/coderabbit-autofix.yml
#
# Enables auto-merge on every PR when all checks pass.
# CodeRabbit posts its review automatically — once it approves and CI passes,
# GitHub's native auto-merge closes the PR without manual intervention.
#
# Copy this to .github/workflows/ in any repo where you want this behavior,
# then run: bash ~/.claude/scripts/setup-repo-automations.sh
# to configure the branch protection rules on that repo.

name: Auto-merge on approval

on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved'
    steps:
      - name: Enable auto-merge for approved PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          echo "Enabling auto-merge on PR #$PR_NUMBER in $REPO"
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --auto \
            --squash \
            --delete-branch \
            || echo "Auto-merge already enabled or PR not mergeable yet"

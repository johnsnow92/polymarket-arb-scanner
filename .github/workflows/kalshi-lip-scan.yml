name: Kalshi LIP Market Scan

# Weekly discovery of Kalshi Liquidity Incentive Program (LIP) markets.
# Read-only: hits Kalshi's public incentive_programs endpoint, uses no
# credentials, places no orders. Produces a ranked digest the LIP bot can
# focus on. Runs Sundays ~08:13 ET (12:13 UTC).

on:
  schedule:
    - cron: '13 12 * * 0'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Kalshi LIP market scan
        run: |
          python scripts/kalshi_rewards_monitor.py --limit 25
          echo "## Kalshi LIP Market Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat data/kalshi-rewards/latest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload digest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kalshi-lip-digest
          path: data/kalshi-rewards/
          retention-days: 30
